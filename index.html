<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#05080f" />
  <title>Volta — A Museum of Art History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>
    <div id="labels"></div>

    <header id="masthead">
      <h1>Volta</h1>
      <p>A Museum of Art History</p>
    </header>

    <div id="hint">
      <span>Scroll to ascend&ensp;·&ensp;Click an island to draw near</span>
    </div>

    <div id="museum-hud">
      <button class="hud-return">←&ensp;The Lobby</button>
      <div class="hud-artist">
        <h2></h2>
        <span></span>
      </div>
      <div class="hud-crosshair"></div>
    </div>

    <div id="walk-overlay">
      <div class="walk-inner">
        <h2></h2>
        <p>
          W A S D — walk&ensp;·&ensp;Mouse — look<br />
          Click a painting to inspect&ensp;·&ensp;ESC — pause
        </p>
        <div class="walk-actions">
          <button class="walk-enter">Step Inside</button>
          <button class="walk-leave ghost">Return to the Lobby</button>
        </div>
      </div>
    </div>

    <div id="transition"></div>

    <div id="veil">
      <div class="veil-inner">
        <h1>Volta</h1>
        <p>raising the vault…</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
